<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Origami Flight Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Klee One", "Yu Kyokasho", YuKyokasho, ui-rounded, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #9fcde0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .paper-grain {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="200" height="200" filter="url(%23n)"/></svg>');
        mix-blend-mode: multiply;
        opacity: 0.13;
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgb(66 45 35 / 16%) 100%
        );
      }

      .hud {
        position: fixed;
        inset: 18px 18px auto auto;
        z-index: 6;
        display: grid;
        gap: 8px;
        min-width: 168px;
        padding: 12px 14px;
        color: #3a2b25;
        background: rgb(255 244 223 / 78%);
        border: 1.6px solid rgb(79 56 54 / 62%);
        border-radius: 14px 4px 16px 5px / 5px 15px 6px 14px;
        box-shadow:
          2px 3px 0 rgb(79 56 54 / 14%),
          0 12px 30px rgb(66 45 35 / 12%);
        backdrop-filter: blur(6px);
        user-select: none;
        transform: rotate(-0.5deg);
      }

      .hud-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        font-size: 12px;
        line-height: 1.2;
      }

      .hud strong {
        font-size: 13px;
        font-weight: 750;
      }

      .keys {
        position: fixed;
        left: 18px;
        bottom: 16px;
        z-index: 6;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        max-width: min(560px, calc(100vw - 36px));
        user-select: none;
      }

      .key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        height: 30px;
        padding: 0 9px;
        color: #392a24;
        font-size: 12px;
        font-weight: 600;
        background: rgb(255 239 208 / 76%);
        border: 1.5px solid rgb(79 56 54 / 55%);
        border-radius: 9px 4px 10px 5px / 4px 9px 5px 10px;
        box-shadow: 1px 3px 0 rgb(87 63 50 / 22%);
      }

      .key:nth-child(odd) {
        transform: rotate(-1deg);
      }

      .key:nth-child(even) {
        transform: rotate(0.8deg);
      }

      @media (max-width: 640px) {
        .hud {
          inset: 12px 12px auto auto;
          min-width: 142px;
          padding: 10px;
        }

        .keys {
          left: 12px;
          bottom: 12px;
        }

        .key {
          min-width: 30px;
          height: 28px;
          padding: 0 7px;
          font-size: 11px;
        }
      }

      /* Mobile Controls Style */
      #mobile-controls {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
      }

      .is-mobile #mobile-controls {
        display: block;
      }

      .is-mobile .keys {
        display: none;
      }

      #joystick-container {
        position: absolute;
        bottom: 24px;
        left: 24px;
        width: 110px;
        height: 110px;
        pointer-events: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }

      #joystick-base {
        width: 100px;
        height: 100px;
        background: rgb(255 244 223 / 68%);
        border: 1.8px solid rgb(79 56 54 / 65%);
        border-radius: 52% 48% 51% 49% / 49% 51% 48% 52%;
        box-shadow:
          2px 3px 0 rgb(79 56 54 / 12%),
          inset 0 0 10px rgb(79 56 54 / 5%);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #joystick-knob {
        width: 44px;
        height: 44px;
        background: rgb(255 239 208 / 92%);
        border: 1.8px solid rgb(79 56 54 / 75%);
        border-radius: 48% 52% 49% 51% / 51% 49% 52% 48%;
        box-shadow: 2px 3px 0 rgb(87 63 50 / 20%);
        position: absolute;
        transition: transform 0.05s ease-out;
        pointer-events: none;
      }

      #boost-button {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 80px;
        height: 80px;
        pointer-events: auto;
        touch-action: none;
        background: rgb(255 239 208 / 85%);
        border: 1.8px solid rgb(79 56 54 / 70%);
        border-radius: 46% 54% 48% 52% / 53% 47% 53% 47%;
        box-shadow: 2px 3px 0 rgb(87 63 50 / 22%);
        color: #3a2b25;
        font-family: inherit;
        font-size: 13px;
        font-weight: 750;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        outline: none;
        transform: rotate(-1deg);
      }

      #boost-button:active {
        background: rgb(255 220 180 / 90%);
        box-shadow: 1px 1px 0 rgb(87 63 50 / 22%);
        transform: translate(1px, 2px) scale(0.96) rotate(-1deg);
      }
    </style>
  </head>
  <body>
    <div class="paper-grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="hud" aria-hidden="true">
      <div class="hud-row"><span>速度</span><strong id="speed">0</strong></div>
      <div class="hud-row"><span>高度</span><strong id="altitude">0</strong></div>
      <div class="hud-row"><span>風</span><strong id="wind">calm</strong></div>
      <div class="hud-row"><span>景色</span><strong id="biome">砂漠</strong></div>
    </div>
    <div class="keys" aria-hidden="true">
      <span class="key">W / ↑</span>
      <span class="key">S / ↓</span>
      <span class="key">A / ←</span>
      <span class="key">D / →</span>
      <span class="key">Space</span>
    </div>
    <div id="mobile-controls">
      <div id="joystick-container">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <button id="boost-button">ブースト</button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/addons/": "./vendor/jsm/"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
